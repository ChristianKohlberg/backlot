# CI runs on BOTH macOS and Linux: agents live on Macs; a Linux-only-tested
# process supervisor would betray the primary user.
name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  check:
    strategy:
      # Independent leg signal: a Linux failure must not cancel the macOS leg
      # (fail-fast cancellations hid the macOS state for months).
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable && pnpm install --frozen-lockfile || npm install
      # The README pin and engines drifted apart once already, and the result
      # was a documented Node version on which the daemon could not start.
      - name: README Node pin matches package.json engines
        run: |
          # Compare major.minor: engines carries a patch (22.13.0) the prose does not.
          ENGINES=$(node -p "require('./package.json').engines.node.replace(/[^0-9.]/g,'').split('.').slice(0,2).join('.')")
          README=$(grep -oE 'Node . [0-9]+\.[0-9]+' README.md | head -1 | grep -oE '[0-9]+\.[0-9]+')
          echo "engines=$ENGINES readme=$README"
          [ "$ENGINES" = "$README" ] || {
            echo "README Node pin ($README) does not match package.json engines ($ENGINES)"; exit 1;
          }
      - run: npm run typecheck
      # The suite exercises the documented core loop (a session `up` plus a
      # `run`), which needs TWO environments: `run` always mints its own
      # ephemeral holder. The capacity heuristic resolves to 1 on small runners
      # (macos-latest is 3 vCPU / 7 GB -> floor(3/2) = floor(7/4) = 1), which is
      # what produced the long-standing 'pool at capacity (1/1)' macOS failures.
      # Pin it here rather than weakening the heuristic for real machines.
      - run: npm test
        env:
          BACKLOT_POOL_MAX: '2'
      # The fixture must stay runnable raw (no backlot) — it doubles as the docs.
      - name: hello-web boots and serves seeded data
        working-directory: examples/hello-web
        run: |
          node seed.mjs ./ci.db dev
          DB_PATH=./ci.db PORT=3999 node server.mjs &
          sleep 1
          curl -sf http://localhost:3999/health
          curl -sf http://localhost:3999/api/greetings | grep -q 'dev preset'
